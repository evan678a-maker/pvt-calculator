<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Annual PVT Calculator </title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:18px;color:#111;}
    .wrap{max-width:980px;}
    h1{font-size:20px;margin:0 0 10px;}
    .panel{padding:12px;border:1px solid #ddd;background:#fafafa;border-radius:8px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;align-items:center;}
    label{font-size:13px;}
    input,select{width:100%;padding:8px;box-sizing:border-box;}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
    button{padding:10px 12px;cursor:pointer;}
    .note{font-size:12px;color:#444;line-height:1.4;}
    #output{margin-top:12px;}
    .err{color:#b00020;}
    .ok{color:#0b6b2d;}
    .full-row { grid-column: 1 / -1; }
    #downloadLink{display:none;margin-top:10px;}
    @media (max-width:780px){.grid{grid-template-columns:1fr;}}
  </style>
</head>

<body>
<div class="wrap">
  <h1>Annual PVT Calculator </h1>

  <div class="panel">
    <div class="grid">
    <label for="addressInput"><b>Address :</b></label>
    <div>
        <input id="addressInput" type="text" placeholder="e.g. 1 George St, Sydney NSW, Australia" />
        <div class="btns" style="margin:8px 0 0;">
          <button id="btnLoadTMY" type="button">Geocode & Load TMY</button>
        </div>
         <div id="locConfirm" class="note" style="margin-top:6px;"></div>
    </div>

      <label for="tiltAngle">Tilt Angle (deg):</label>
      <input id="tiltAngle" type="number" step="0.01" value="30" />

      <label for="azimuthAngle">Surface Azimuth Angle (deg):</label>
      <input id="azimuthAngle" type="number" step="0.01" value="0" />

      <label for="albedo">Ground Albedo (0-1):</label>
      <input id="albedo" type="number" min="0" max="1" step="0.01" value="0.2" />

      <label for="area">Collector / PV Area A (m²):</label>
      <input id="area" type="number" min="0" step="0.01" value="1.0" />
      <label for="flowRate">Flow Rate (L/s/m²):</label>
      <input id="flowRate" type="number" min="0" step="0.001" value="0.02" />
      <label for="etaPv">PV efficiency η (0–1):</label>
      <input id="etaPv" type="number" min="0" max="1" step="0.01" value="0.20" />

      <label for="tin">Inlet temperature Tin (°C):</label>
      <input id="tin" type="number" step="0.1" value="10" />
        <div class="hint full-row" style="margin:8px 0 4px; font-size:12px; color:#555; line-height:1.4;">
      <b>PVT Thermal Efficiency Model：</b>
      <code>η_th = a0 + a1 * ((Tin - Ta) / G) + a2 * v_wind</code>
      <span style="display:block;">
       Tin/Ta(°C)，G(W/m²)，v_wind(m/s)。
      </span>
      </div>

      <label for="pvtA0">PVT a0:</label>  
      <input id="pvtA0" type="number" step="0.000000001" value="0.279952866" />

      <label for="pvtA1">PVT a1:</label>
      <input id="pvtA1" type="number" step="0.000000001" value="-10.52839866" />

      <label for="pvtA2">PVT a2:</label>
      <input id="pvtA2" type="number" step="0.000000001" value="-0.008135537" />

    <div class="btns">
      <button id="btnAnnual" type="button">Calculate Annual PV + Thermal</button>
      <a id="downloadLink" href="#" target="_blank" rel="noopener">Download hourly details CSV</a>
    </div>


  </div>

  <div id="output" class="panel">Ready.</div>

  <script>
    //Solar radiation + annual PVT calculator

    class TiltedSurfaceRadiation {
      constructor(latitude, longitude, tiltAngle, surfaceAzimuth, albedo = 0.2) {
        this.latitude = latitude;
        this.longitude = longitude;
        this.tiltAngle = tiltAngle;
        this.surfaceAzimuth = surfaceAzimuth;
        this.albedo = albedo;
      }

      toRadians(deg) { return deg * (Math.PI / 180); }
      toDegrees(rad) { return rad * (180 / Math.PI); }

      declinationAngle(dayN) {
        return 23.45 * Math.sin(this.toRadians((360 / 365) * (dayN + 284)));
      }

      hourAngle(hourN) {
        return 15 * (hourN - 12);
      }

      zenithAngle(dayN, hourN) {
        const deltaRad = this.toRadians(this.declinationAngle(dayN));
        const omegaRad = this.toRadians(this.hourAngle(hourN));
        const latRad   = this.toRadians(this.latitude);

        const cosThetaZ =
          Math.sin(deltaRad) * Math.sin(latRad) +
          Math.cos(deltaRad) * Math.cos(latRad) * Math.cos(omegaRad);

        const cosClamped = Math.min(1, Math.max(-1, cosThetaZ));
        return this.toDegrees(Math.acos(cosClamped));
      }

      incidenceAngle(dayN, hourN) {
        const deltaRad = this.toRadians(this.declinationAngle(dayN));
        const omegaRad = this.toRadians(this.hourAngle(hourN));
        const latRad   = this.toRadians(this.latitude);
        const sRad     = this.toRadians(this.tiltAngle);
        const gammaRad = this.toRadians(this.surfaceAzimuth);

        const item1 = Math.sin(deltaRad) * Math.sin(latRad) * Math.cos(sRad);
        const item2 = Math.sin(deltaRad) * Math.cos(latRad) * Math.sin(sRad) * Math.cos(gammaRad);
        const item3 = Math.cos(deltaRad) * Math.cos(latRad) * Math.cos(sRad) * Math.cos(omegaRad);
        const item4 = Math.cos(deltaRad) * Math.sin(latRad) * Math.sin(sRad) * Math.cos(gammaRad) * Math.cos(omegaRad);
        const item5 = Math.cos(deltaRad) * Math.sin(sRad) * Math.sin(gammaRad) * Math.sin(omegaRad);

        const cosThetaT = item1 - item2 + item3 + item4 + item5;
        const cosClamped = Math.min(1, Math.max(-1, cosThetaT));
        return this.toDegrees(Math.acos(cosClamped));
      }

      beamRadiationRatio(dayN, hourN) {
      const thetaT = this.incidenceAngle(dayN, hourN);
      const thetaZ = this.zenithAngle(dayN, hourN);

      const cosThetaT = Math.cos(this.toRadians(thetaT));
      const cosThetaZ = Math.cos(this.toRadians(thetaZ));

      if (cosThetaZ <= 1e-6) return 0;              
     return Math.max(0, cosThetaT) / cosThetaZ;    
    }


    calculate(dayN, hourN, dni, dhi) {
    const thetaZ = this.zenithAngle(dayN, hourN);
    const cosThetaZ = Math.cos(this.toRadians(thetaZ));
    const eps = 1e-6;

    const DNI = Math.max(0, (dni || 0));
    const DHI = Math.max(0, (dhi || 0));

    const BHI = (cosThetaZ > eps) ? (DNI * Math.max(0, cosThetaZ)) : 0;
    const ghi = BHI + DHI;

     const thetaT = this.incidenceAngle(dayN, hourN);
    const cosThetaT = Math.cos(this.toRadians(thetaT));
    const beamComponent = (cosThetaZ > eps) ? (DNI * Math.max(0, cosThetaT)) : 0;

    const diffuseComponent =
    DHI * ((1 + Math.cos(this.toRadians(this.tiltAngle))) / 2);

    const groundReflectedComponent =
    ghi * this.albedo * ((1 - Math.cos(this.toRadians(this.tiltAngle))) / 2);

    const totalIrradiance = Math.max(
    0,
    beamComponent + diffuseComponent + groundReflectedComponent
    );

    return { totalIrradiance, ghi, dni: DNI, bhi: BHI };
    }
      }

    function setOutput(html, isError=false){
      document.getElementById("output").innerHTML = isError
        ? `<span class="err">${html}</span>`
        : html;
    }

    function clamp(x, lo, hi){ return Math.min(hi, Math.max(lo, x)); }
    function isFiniteNumber(x){ return typeof x === "number" && Number.isFinite(x); }


    // ====== Address -> (lat, lon) via Nominatim (no key) ======
async function geocodeAddress(address){
  const q = (address || "").trim();
  if (!q) throw new Error("Please input an address.");
  const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" + encodeURIComponent(q);
  const resp = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!resp.ok) throw new Error("Geocoding failed: " + resp.status);
  const arr = await resp.json();
  if (!Array.isArray(arr) || !arr.length) throw new Error("No geocoding result for this address.");
  return {
    lat: parseFloat(arr[0].lat),
    lon: parseFloat(arr[0].lon),
    name: arr[0].display_name || q
  };
}

async function fetchTimezone(lat, lon){
  try {
    // timeapi.io 
    const url = `https://timeapi.io/api/TimeZone/Coordinate?latitude=${lat}&longitude=${lon}`;
    const resp = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!resp.ok) throw new Error("Timezone fetch failed: " + resp.status);
    const data = await resp.json();
    return data;
  } catch (e) {
    console.warn("Could not fetch timezone:", e);
    return null;
  }
}
// ====== Fetch TMY from your Render backend ======
async function fetchTMY(lat, lon){
  const tzName = (CURRENT_TZ && CURRENT_TZ.timeZone) ? CURRENT_TZ.timeZone : "";
  const gmtOffset = (CURRENT_TZ && Number.isFinite(CURRENT_TZ.gmtOffset)) ? CURRENT_TZ.gmtOffset : "";

  const tzParams = tzName ? `&tzName=${encodeURIComponent(tzName)}` : "";
  const offsetParams = (typeof gmtOffset === "number" && isFinite(gmtOffset)) ? `&gmtOffset=${gmtOffset}` : "";

  const url = `https://https://pvt-tmy-api-e66w.onrender.com/tmy?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}${tzParams}${offsetParams}`;
  const resp = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!resp.ok) throw new Error("TMY fetch failed: " + resp.status);
  return await resp.json();
}

// day-of-year helper (non-leap year)
function dayOfYearFromMonthDay(month, day){
  const md = [31,28,31,30,31,30,31,31,30,31,30,31];
  let s = 0;
  for (let i = 0; i < month - 1; i++) s += md[i];
  return s + day;
}

// Normalize Render TMY JSON -> [{dayN,hourN,dni,dhi,ta,vwind}, ...]
function normalizeTMYRecords(raw){
  const arr = Array.isArray(raw?.records) ? raw.records : (Array.isArray(raw) ? raw : null);
  if (!arr) throw new Error("TMY JSON missing records[]");
  return normalizeWeatherRecords(arr);
}



// ====== State (current location + weather) ======
let CURRENT_LOC = null;   // {name, lat, lon}
let CURRENT_MET = null;   // normalized array
let CURRENT_TZ = null;    // { timeZone, gmtOffset }

async function loadTMYByAddress(){
  const addr = document.getElementById("addressInput").value;
  setOutput("Geocoding & loading TMY...");
  const loc = await geocodeAddress(addr);

  // 新增：获取时区信息
  const tzInfo = await fetchTimezone(loc.lat, loc.lon);
  CURRENT_TZ = tzInfo;

  const tzDisplay = tzInfo?.timeZone ? `${tzInfo.timeZone} (GMT offset ${tzInfo.gmtOffset ?? ""})` : "unknown";
  document.getElementById("locConfirm").textContent =
    `Location: ${loc.name} (lat=${loc.lat.toFixed(6)}, lon=${loc.lon.toFixed(6)}), Timezone: ${tzDisplay}`;

  // 继续加载 TMY
  const raw = await fetchTMY(loc.lat, loc.lon);
  const met = normalizeTMYRecords(raw);

  CURRENT_LOC = loc;
  CURRENT_MET = met;

  setOutput("TMY loaded. Now click Calculate Annual PV + Thermal.");
}

async function loadTMYFromUI(){
  const addr = (document.getElementById("addressInput")?.value || "").trim();
  if (!addr) throw new Error("Please input an address first.");
  await loadTMYByAddress();
}

document.getElementById("btnLoadTMY").addEventListener("click", async () => {
  try { await loadTMYFromUI(); }
  catch (e) { console.error(e); setOutput(`Error: ${e.message}`, true); }
});
    //PVT model 
    const DEFAULTS = {
    etaPv: 0.20,
    tin: 10,
     a0: 0.279952866,
     a1: -10.52839866,
     a2: -0.008135537
    };

    function parseCSV(text){
      const lines = text.replace(/\r/g,"").split("\n").map(s=>s.trim()).filter(Boolean);
      if (!lines.length) return [];

      const header = lines[0].split(",").map(s=>s.trim().toLowerCase());
      const idx = (name) => header.indexOf(name);

      const iDay  = idx("dayn");
      const iHour = idx("hourn");
      const iDNI  = idx("dni");
      const iDHI  = idx("dhi");
      const iTa   = idx("ta");
      const iVw   = idx("vwind");

      if ([iDay,iHour,iDNI,iDHI,iTa,iVw].some(i=>i<0)) {
        throw new Error("CSV header must include: dayN,hourN,dni,dhi,ta,vwind");
      }

      const rows = [];
      for (let k=1; k<lines.length; k++){
        const c = lines[k].split(",").map(s=>s.trim());
        rows.push({
          dayN: +c[iDay],
          hourN: +c[iHour],
          dni: +c[iDNI],
          dhi: +c[iDHI],
          ta: +c[iTa],
          vwind: +c[iVw]
        });
      }
      return rows;
    }

    function extractJSONFromJS(text){
      const s = text.replace(/^\uFEFF/, "").trim();

      const s2 = s.replace(/^\s*export\s+default\s+/,"").trim();

      const firstBrace = s2.search(/[\{\[]/);
      if (firstBrace < 0) throw new Error("No JSON object/array found in the file.");

      const lastBrace = Math.max(s2.lastIndexOf("}"), s2.lastIndexOf("]"));
      if (lastBrace < 0 || lastBrace <= firstBrace) throw new Error("Invalid JSON/JS content.");

      let jsonCandidate = s2.slice(firstBrace, lastBrace + 1).trim();

      if (jsonCandidate.endsWith(";")) jsonCandidate = jsonCandidate.slice(0, -1);

      return jsonCandidate;
    }

    function normalizeWeatherRecords(raw){
    let arr;
    if (Array.isArray(raw)) arr = raw;
    else if (raw && typeof raw === "object") arr = Object.values(raw);
    else throw new Error("Unsupported weather data structure.");

    const out = [];
    for (const r of arr){
        if (!r || typeof r !== "object") continue;

        const dayN = +(r.dayN ?? r.dayn ?? r.DayN ?? r.DAYN);
        let hourN  = +(r.hourN ?? r.hourn ?? r.HourN ?? r.HOURN);

        const dni   = +(r.DNI ?? r.dni ?? r.Dni);
        const dhi   = +(r.DHI ?? r.dhi ?? r.Dhi);
        const ta    = +(r.Ta  ?? r.ta  ?? r.TA);
        const vwind = +(r.Vwind ?? r.vwind ?? r.VWIND ?? r.VWind);

        // hourN
        if (Number.isFinite(hourN) && hourN >= 1 && hourN <= 24) hourN = hourN - 1;

        out.push({ dayN, hourN, dni, dhi, ta, vwind });
    }
    return out;
    }

    function parseWeatherFileText(text, filename=""){
      const name = (filename || "").toLowerCase();

      if (name.endsWith(".csv")) return normalizeWeatherRecords(parseCSV(text));
      try {
        const raw = JSON.parse(text);
        return normalizeWeatherRecords(raw);
      } catch (_) {
        const jsonText = extractJSONFromJS(text);
        const raw = JSON.parse(jsonText);
        return normalizeWeatherRecords(raw);
      }
    }

    // Annual calculation only 
async function calcAnnualPVT(){
  try {
    // 1) read inputs (恢复 V3.44)
    const tiltAngle = parseFloat(document.getElementById("tiltAngle").value);
    const azimuthAngle = parseFloat(document.getElementById("azimuthAngle").value);
    const albedo = parseFloat(document.getElementById("albedo").value);
    const A = parseFloat(document.getElementById("area").value);
    const flowRate = parseFloat(document.getElementById("flowRate").value);

    const etaPv = parseFloat(document.getElementById("etaPv").value);
    const Tin   = parseFloat(document.getElementById("tin").value);

    const a0 = parseFloat(document.getElementById("pvtA0").value);
    const a1 = parseFloat(document.getElementById("pvtA1").value);
    const a2 = parseFloat(document.getElementById("pvtA2").value);

    const needed = [tiltAngle, azimuthAngle, albedo, A, flowRate, etaPv, Tin, a0, a1, a2];
    if (needed.some(v => !isFiniteNumber(v))) {
      setOutput("Please fill in all inputs with valid numbers.", true);
      return;
    }
    if (A <= 0) { setOutput("Area A must be > 0.", true); return; }
    if (flowRate < 0) { setOutput("Flow Rate must be ≥ 0.", true); return; }
    if (etaPv < 0 || etaPv > 1) { setOutput("PV efficiency η must be between 0 and 1.", true); return; }

    const totalFlow_kg_hr = flowRate * A * 3600;

    // 2) ensure TMY loaded (地址为空则用城市)
    if (!CURRENT_MET || !CURRENT_LOC) {
      await loadTMYFromUI();
    }
    const latitude = CURRENT_LOC.lat;
    const longitude = CURRENT_LOC.lon;
    const met = CURRENT_MET;

    if (!met || !met.length) {
      setOutput("TMY contains no usable records.", true);
      return;
    }

    // 3) calculate
    const calculator = new TiltedSurfaceRadiation(latitude, longitude, tiltAngle, azimuthAngle, albedo);

    let E_pv_kWh = 0;
    let E_th_kWh = 0;

    const out = [];
    out.push(["dayN","hourN","gtilt_Wm2","eta_th","pv_kWh","th_kWh","totalFlow_kg_hr","Tout_C"].join(","));

    let used = 0;

    for (const r of met){
      if (![r.dayN,r.hourN,r.dni,r.dhi,r.ta,r.vwind].every(isFiniteNumber)) continue;

      const res = calculator.calculate(r.dayN, r.hourN, r.dni, r.dhi);
      const G = Math.max(0, res.totalIrradiance);

      let etaTh = 0;
      if (G > 1e-6){
        etaTh = a0 + a1 * ((Tin - r.ta) / G) + a2 * r.vwind;
        etaTh = clamp(etaTh, 0, 1);
      }

      const pv_kWh = (etaPv * G * A) / 1000;
      const th_kWh = (etaTh * G * A) / 1000;

      const hourlyFlow_kg_hr = (th_kWh > 1e-12) ? totalFlow_kg_hr : "";
      E_pv_kWh += pv_kWh;
      E_th_kWh += th_kWh;

      let Tout_C = "";
      if (th_kWh > 1e-12 && totalFlow_kg_hr > 1e-12) {
        Tout_C = Tin + (th_kWh * 3600) / (totalFlow_kg_hr * 4.184);
      }

      out.push([
        r.dayN, r.hourN + 1,
        G.toFixed(2),
        etaTh.toFixed(2),
        pv_kWh.toFixed(2),
        th_kWh.toFixed(2),
        (hourlyFlow_kg_hr === "" ? "" : (+hourlyFlow_kg_hr).toFixed(2)),
        (Tout_C === "" ? "" : (+Tout_C).toFixed(2))
      ].join(","));

      used++;
    }

    if (used === 0){
      setOutput("No valid numeric rows found in the TMY records.", true);
      return;
    }

    setOutput(`
      <h3>Annual Results (hourly sum)</h3>
      <p><b>Location:</b> ${CURRENT_LOC.name} (lat=${latitude}, lon=${longitude})</p>
      <p><b>Valid hourly records used:</b> ${used}</p>
      <p><b>PV :</b> <span class="ok">${E_pv_kWh.toFixed(1)} kWh</span></p>
      <p><b>Thermal (PVT model):</b> <span class="ok">${E_th_kWh.toFixed(1)} kWh</span></p>
      <p><b>Total:</b> <span class="ok">${(E_pv_kWh + E_th_kWh).toFixed(1)} kWh</span></p>
    `);

    // 4) download
    const csv = out.join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.getElementById("downloadLink");
    const safeName = (CURRENT_LOC.name || "location").toLowerCase().replace(/[^a-z0-9]+/g,"_");
    a.href = url;
    a.download = `Annual_PVT_${safeName}_${used}h.csv`;
    a.style.display = "inline-block";
    a.textContent = "Download hourly details CSV";

  } catch (err) {
    console.error(err);
    setOutput(`Error: ${err.message}`, true);
  }
}
    // UI 

    document.getElementById("btnAnnual").addEventListener("click", calcAnnualPVT);
  </script>
</div>
</body>
</html>
